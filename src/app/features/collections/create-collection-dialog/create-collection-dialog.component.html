<h2 mat-dialog-title>Create collection</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Collection name</mat-label>
    <input matInput [formControl]="nameControl" placeholder="my_collection" />
    @if (nameControl.hasError('required') && nameControl.touched) {
      <mat-error>Name is required</mat-error>
    }
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="submit()" [disabled]="nameControl.invalid || submitting">
    Create
  </button>
</mat-dialog-actions>

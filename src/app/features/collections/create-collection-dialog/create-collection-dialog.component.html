<div class="form-stack">
  <label class="vb-field-label" for="create-collection-name">Collection name</label>
  <vb-input
    id="create-collection-name"
    [value]="nameControl.value"
    (valueChange)="nameControl.setValue($event); nameControl.markAsTouched()"
    placeholder="my_collection"
  />
  @if (nameControl.hasError('required') && nameControl.touched) {
    <p class="vb-field-error">Name is required</p>
  }
</div>
<div class="form-actions">
  <vb-button variant="text" label="Cancel" (click)="onCancel()" [disabled]="submitting()" />
  <vb-button
    variant="filled"
    label="Create"
    (click)="submit()"
    [disabled]="nameControl.invalid || submitting()"
  />
</div>

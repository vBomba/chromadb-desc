@if (collection(); as c) {
  <div class="delete-body">
    <p>
      Are you sure you want to delete the collection <strong>{{ c.name }}</strong>? This action cannot be
      undone.
    </p>
    <p class="id-hint"><code>{{ c.id }}</code></p>
  </div>
  <div class="delete-actions">
    <vb-button variant="text" label="Cancel" (click)="cancel()" />
    <vb-button variant="filled" color="warn" label="Delete" (click)="confirm()" [disabled]="deleting()" />
  </div>
}

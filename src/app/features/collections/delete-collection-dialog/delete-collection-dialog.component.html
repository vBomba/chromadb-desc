<h2 mat-dialog-title>Delete collection</h2>
<mat-dialog-content>
  <p>
    Are you sure you want to delete the collection <strong>{{ collection.name }}</strong>?
    This action cannot be undone.
  </p>
  <p class="id-hint"><code>{{ collection.id }}</code></p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="warn" (click)="confirm()" [disabled]="deleting">
    Delete
  </button>
</mat-dialog-actions>

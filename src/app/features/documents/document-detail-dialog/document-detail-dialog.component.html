<div class="dialog-content detail-content">
  <section class="detail-section">
    <h3>ID</h3>
    <code class="id-block">{{ row.id }}</code>
  </section>
  <section class="detail-section">
    <h3>Document</h3>
    <pre class="document-block">{{ row.document ?? '—' }}</pre>
  </section>
  <section class="detail-section">
    <h3>Metadata</h3>
    <pre class="metadata-block">{{ formatMetadata(row.metadata) }}</pre>
  </section>
  <section class="detail-section">
    <h3>Embedding</h3>
    <pre class="embedding-block">{{ embeddingSummary }}</pre>
  </section>
</div>
<div class="dialog-actions">
  <vb-button variant="filled" label="Close" iconClass="bx bx-check" (click)="close()" />
</div>

<h2 mat-dialog-title>Add document</h2>
<mat-dialog-content>
  <div class="field-block">
    <label class="vb-field-label" for="add-doc-id">ID</label>
    <vb-input
      id="add-doc-id"
      [value]="idControl.value"
      (valueChange)="idControl.setValue($event); idControl.markAsTouched()"
      placeholder="doc_1"
    />
    @if (idControl.hasError('required') && idControl.touched) {
      <p class="vb-field-error">ID is required</p>
    }
  </div>
  <div class="field-block">
    <label class="vb-field-label" for="add-doc-text">Document text</label>
    <vb-textarea
      id="add-doc-text"
      [value]="documentControl.value"
      (valueChange)="documentControl.setValue($event)"
      [rows]="4"
      placeholder="Content…"
    />
  </div>
  <div class="field-block">
    <label class="vb-field-label" for="add-doc-meta">Metadata (JSON)</label>
    <vb-textarea
      id="add-doc-meta"
      [value]="metadataControl.value"
      (valueChange)="metadataControl.setValue($event)"
      [rows]="3"
      placeholder='{"key": "value"}'
      [mono]="true"
    />
  </div>
  @if (data.dimension == null) {
    <p class="hint">Embedding dimension is unknown; using {{ dimension }}. Ensure your backend can index this.</p>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <vb-button variant="text" label="Cancel" (click)="cancel()" />
  <vb-button variant="filled" label="Add" (click)="submit()" [disabled]="idControl.invalid || submitting" />
</mat-dialog-actions>

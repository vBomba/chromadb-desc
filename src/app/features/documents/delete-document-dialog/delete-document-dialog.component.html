<div class="dialog-content">
  <p>Are you sure you want to delete this document? This action cannot be undone.</p>
  <p class="id-line"><code>{{ row.id }}</code></p>
  @if (row.document) {
    <p class="preview">{{ row.document.length > 100 ? row.document.slice(0, 100) + '…' : row.document }}</p>
  }
</div>
<div class="dialog-actions">
  <vb-button variant="text" label="Cancel" iconClass="bx bx-x" (click)="cancel()" />
  <vb-button
    variant="filled"
    color="warn"
    label="Delete"
    iconClass="bx bx-trash"
    (click)="confirm()"
    [disabled]="deleting"
  />
</div>

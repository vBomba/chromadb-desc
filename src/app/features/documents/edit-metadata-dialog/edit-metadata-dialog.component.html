<div class="dialog-content edit-meta-content">
  <div class="header-row">
    <div class="id-block">
      <div class="label">ID</div>
      <code>{{ row.id }}</code>
    </div>
    @if (row.document) {
      <div class="doc-preview">
        <div class="label">Document preview</div>
        <div class="doc-text">
          {{ row.document.length > 140 ? row.document.substring(0, 140) + '…' : row.document }}
        </div>
      </div>
    }
  </div>
  <div class="field-block">
    <label class="vb-field-label" for="edit-meta-json">Metadata (JSON)</label>
    <vb-textarea
      id="edit-meta-json"
      [value]="metadataControl.value"
      (valueChange)="metadataControl.setValue($event)"
      [rows]="10"
      placeholder='{\n  "key": "value"\n}'
      [mono]="true"
    />
    <p class="field-hint">Use valid JSON. Empty value means no metadata.</p>
  </div>
</div>
<div class="dialog-actions">
  <vb-button variant="text" label="Cancel" iconClass="bx bx-x" (click)="cancel()" />
  <vb-button
    variant="text"
    label="Reset"
    iconClass="bx bx-reset"
    type="button"
    (click)="resetToOriginal()"
    [disabled]="submitting"
  />
  <vb-button variant="filled" label="Save" iconClass="bx bx-save" (click)="submit()" [disabled]="submitting" />
</div>

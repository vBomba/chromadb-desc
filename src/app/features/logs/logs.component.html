<div class="vb-panel logs-card">
  <header class="vb-panel__head">
    <div class="vb-panel__titles">
      <h2 class="vb-panel__title">Logs</h2>
      <p class="vb-panel__subtitle">Latest API errors (last 100 entries)</p>
    </div>
    <vb-button variant="filled" color="warn" label="Clear" (click)="clear()" [disabled]="!errorLog.logs().length" />
  </header>
  <div class="vb-panel__body">
    @if (!errorLog.logs().length) {
      <p class="empty">No entries yet.</p>
    } @else {
      <vb-simple-table [columns]="logColumns" [rows]="logRows()" />
    }
  </div>
</div>

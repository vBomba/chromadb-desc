<mat-sidenav-container class="dashboard-container">
  <mat-sidenav
    #drawer
    [mode]="sidenavMode()"
    [opened]="!isHandset()"
    class="dashboard-sidenav"
  >
    <mat-toolbar class="sidenav-toolbar">Chroma Desc</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/connection" routerLinkActive="active" (click)="isHandset() && drawer.close()">
        <mat-icon matListItemIcon>link</mat-icon>
        <span matListItemTitle>Connection</span>
      </a>
      <a mat-list-item routerLink="/collections" routerLinkActive="active" (click)="isHandset() && drawer.close()">
        <mat-icon matListItemIcon>folder</mat-icon>
        <span matListItemTitle>Collections</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="dashboard-content">
    <mat-toolbar class="main-toolbar">
      @if (isHandset()) {
      <button
        mat-icon-button
        type="button"
        (click)="drawer.toggle()"
        aria-label="Toggle menu"
      >
        <mat-icon>menu</mat-icon>
      </button>
    }
      <span class="toolbar-spacer"></span>
      <span class="heartbeat-indicator" [matTooltip]="heartbeatTooltip()">
        @switch (heartbeat.status()) {
          @case ('checking') {
            <mat-spinner diameter="20" class="heartbeat-spinner"></mat-spinner>
          }
          @case ('connected') {
            <mat-icon class="status-icon connected" aria-hidden="true">fiber_manual_record</mat-icon>
          }
          @case ('disconnected') {
            <mat-icon class="status-icon disconnected" aria-hidden="true">fiber_manual_record</mat-icon>
          }
          @case ('idle') {
            <mat-icon class="status-icon idle" aria-hidden="true">fiber_manual_record</mat-icon>
          }
        }
      </span>
      <button
        mat-icon-button
        type="button"
        (click)="themeService.toggleTheme()"
        [attr.aria-label]="themeService.theme() === 'light' ? 'Switch to dark theme' : 'Switch to light theme'"
      >
        <mat-icon>{{ themeService.theme() === 'light' ? 'dark_mode' : 'light_mode' }}</mat-icon>
      </button>
    </mat-toolbar>
    <main class="main-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
